<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timerboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page">

    <header class="topbar">
      <div class="top-left">
        <button id="sidebarToggle" class="icon-btn" aria-label="Toggle sidebar">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="6" x2="21" y2="6"/>
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <span class="brand">Timer<em>board</em></span>
      </div>
      <div class="top-right">
        <span id="authStatus" class="auth-status">Not signed in</span>
        <a id="loginLink" class="top-btn" href="login.html">Log In</a>
        <button id="logoutBtn" class="top-btn ghost" type="button">Log Out</button>
      </div>
    </header>

    <section class="layout">

      <aside id="sidebar" class="saved-timers" aria-label="Saved timers list">
        <div class="sidebar-heading">Saved Timers</div>
        <button class="timer-item" data-minutes="1" data-seconds="30">
          <span class="item-name">Timer 1</span>
          <span class="item-time">01:30</span>
        </button>
        <button class="timer-item" data-minutes="8" data-seconds="0">
          <span class="item-name">Pasta Timer</span>
          <span class="item-time">08:00</span>
        </button>
        <button class="timer-item" data-minutes="15" data-seconds="0">
          <span class="item-name">Timer 3</span>
          <span class="item-time">15:00</span>
        </button>
        <button class="timer-item" data-minutes="50" data-seconds="0">
          <span class="item-name">Baked Potato Timer</span>
          <span class="item-time">50:00</span>
        </button>
      </aside>

      <section class="timer-panel" aria-label="Main timer panel">
        <div class="card">

          <div class="card-name-row">
            <span id="timerLabel" class="card-name">Timer</span>
          </div>

          <div class="display-box">
            <span id="timerDisplay">06:07</span>
            <span id="timerStatusLabel" class="display-status">Ready</span>
          </div>

          <div class="set-row">
            <div class="set-group">
              <input id="minutesInput" type="number" min="0" max="999" value="6">
              <label for="minutesInput">min</label>
            </div>
            <span class="set-sep">:</span>
            <div class="set-group">
              <input id="secondsInput" type="number" min="0" max="59" value="7">
              <label for="secondsInput">sec</label>
            </div>
            <button id="setBtn" class="set-btn" type="button">Set</button>
          </div>

          <div class="controls">
            <button id="startBtn" class="action start" type="button">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
              Start
            </button>
            <button id="pauseBtn" class="action pause" type="button">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
              Pause
            </button>
            <button id="resetBtn" class="action reset" type="button">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.5"/></svg>
              Reset
            </button>
          </div>

          <button id="micToggleBtn" class="mic-btn" type="button">
            <span class="mic-dot"></span>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
              <line x1="12" y1="19" x2="12" y2="23"/>
              <line x1="8" y1="23" x2="16" y2="23"/>
            </svg>
            Enable Mic
          </button>
          <p id="micState" class="mic-state">Mic disabled</p>

          <div class="transcript-wrap">
            <p class="transcript-label">Transcript</p>
            <div id="transcript" class="transcript-box"></div>
          </div>

          <p id="timerStatus" class="timer-status">Ready.</p>

        </div>
      </section>

    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
